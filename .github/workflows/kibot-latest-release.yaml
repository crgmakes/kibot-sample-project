# Aquarius - Automation Simplified
#
# @brief Git script for exporting PCB data for the repo.
# @note runs manually or automatically when there is a release
# @date 8/13/25
# @author cyberreefguru
# (c) CRG Makes 2025
name: Kibot-Sample-Release
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  export-ecad:
    name: Kibot Sample Latest
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest
    #container: ghcr.io/inti-cmnb/kicad9_auto_full:1.8.5
    env:
      repo-name: 'kibot-sample-project'
      file-name: 'kibot-sample'

    steps:
    - name: Update system
      run: |
        apt update
        apt -y install git zip

    - name: Checkout Repository
      uses: actions/checkout@v6
      with:
        path: working/${{env.repo-name}}

    - name: Checkout Extras
      uses: actions/checkout@v6
      with:
        repository: crgmakes/kicad-extras
        path: working/kicad-extras

    - name: Checkout CRGM Library
      uses: actions/checkout@v6
      with:
        repository: crgmakes/kicad-library
        path: working/kicad-library

    - name: Checkout PcbDraw Library
      uses: actions/checkout@v6
      with:
        repository: yaqwsx/PcbDraw-Lib
        path: working/PcbDraw-Lib

    - name: Checkout Fab Kit Library
      uses: actions/checkout@v6
      with:
        repository: bennymeg/Fabrication-Toolkit
        path: working/Fabrication-Toolkit

    - name: Update fonts
      run: |
        mkdir -p /usr/share/fonts/
        cp working/kicad-extras/fonts/* /usr/share/fonts/
        fc-cache -f -v

    - name: Set manual version
      if: github.event_name != 'release'
      run: |
        echo "VERSION=$(date "+%m%d%y-%H%M")" >> $GITHUB_ENV
    - name: Set release version
      if: github.event_name == 'release'
      run: |
        echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
    - name: Set hash
      run: |
        cd working/${{env.repo-name}}
        echo "HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    # Update PCB with version, hash, and date
    - name: Update build variables
      run: |
        echo "Working Directory $(pwd)"
        echo "version: ${{env.VERSION}}"    
        echo "hash: '${{env.HASH}}'"
        cd working/${{env.repo-name}}/pcb
        export RELEASE_DATE=$(date "+%m/%d/%Y @ %H:%M")
        sed -i "s!<<hash>>!${{env.HASH}}!" *.kicad_pcb
        sed -i "s!<<hash>>!${{env.HASH}}!" *.kicad_sch
        sed -i "s!<<tag>>!${{env.VERSION}}!" *.kicad_pcb
        sed -i "s!<<tag>>!${{env.VERSION}}!" *.kicad_sch
        sed -i "s!<<release-date>>!${RELEASE_DATE}!" *.kicad_pcb
        sed -i "s!<<release-date>>!${RELEASE_DATE}!" *.kicad_sch

    # generates full fab files for the single PCB, includes gerber, drill, ibom, schematic, images, 3d model, and renders
    - name: Generate Release Fabrication Files
      run: |
        echo "Working Directory: ${GITHUB_WORKSPACE}"
        cd working/${{env.repo-name}}/
        kibot -c kibot/crgm.kibot.yaml -e pcb/${{env.file-name}}.kicad_sch -b pcb/${{env.file-name}}.kicad_pcb -d production jlc_fab_4
        zip -r ${{env.file-name}}-${{env.VERSION}}.zip pcb
        cd production
        zip -ur ../${{env.file-name}}-${{env.VERSION}}.zip pnp
        zip -jr ${{env.file-name}}-${{env.VERSION}}-gerber.zip gerber
        zip -u ../${{env.file-name}}-${{env.VERSION}}.zip ${{env.file-name}}-${{env.VERSION}}-gerber.zip
        cd ..
        mv ${{env.file-name}}-${{env.VERSION}}.zip ../../${{env.file-name}}-${{env.VERSION}}.zip

    # generates fab files for the panel PCB, includes gerber, drill, images - does NOT include ibom, 3d model, schematic, or renders
    - name: Generate Panel Release
      run: |
        cd working/${{env.repo-name}}/pcb/panel
        rm -rf production
        kibot -c ../../kibot/crgm.kibot.yaml -e ../${{env.file-name}}.kicad_sch -b ../${{env.file-name}}.kicad_pcb -d pcb create_panel
        cp ../${{env.file-name}}.kicad_sch pcb/${{env.file-name}}-panel-${{env.VERSION}}.kicad_sch
        kibot -c ../../kibot/crgm.kibot.yaml -e ../${{env.file-name}}.kicad_sch -b pcb/${{env.file-name}}-panel-${{env.VERSION}}.kicad_pcb -d production jlc_fab_4
        zip -r ${{env.file-name}}-panel-${{env.VERSION}}.zip pcb
        cd production
        zip -jr ${{env.file-name}}-panel-gerber-${{env.VERSION}}.zip gerber 
        zip -ur ../${{env.file-name}}-panel-${{env.VERSION}}.zip ${{env.file-name}}-panel-gerber-${{env.VERSION}}.zip pnp
        cd ..
        mv ${{env.file-name}}-panel-${{env.VERSION}}.zip ../../../../${{env.file-name}}-panel-${{env.VERSION}}.zip

    # Upload fab artifacts to release
    - name: Upload Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'release'
      with:
        # name: '${{inputs.name}} ${{env.VERSION}}'
        files: |
          ${{env.file-name}}-${{env.VERSION}}.zip
          ${{env.file-name}}-panel-${{env.VERSION}}.zip
